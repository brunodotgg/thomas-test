<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thomas's RS3 8Y</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #BB0A21;
      --black: #111111;
      --grey: #888888;
      --light: #f5f5f5;
      --white: #ffffff;
      --font: 'Inter', system-ui, sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
    }

    nav .nav-model {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
    }

    nav .nav-name {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      background: linear-gradient(160deg, #111111 0%, #1c1c1c 60%, #2a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .hero-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .hero-headline {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .hero-rule {
      width: 3rem;
      height: 2px;
      background: var(--red);
      border: none;
    }

    /* Specs */
    .specs {
      padding: 6rem 3rem;
      background: var(--white);
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 3rem;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .spec-item {
      padding: 2rem 0;
      border-top: 1px solid #e5e5e5;
      padding-right: 2rem;
    }

    .spec-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .spec-label {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
    }

    @media (max-width: 768px) {
      .specs { padding: 4rem 1.5rem; }
      .specs-grid { grid-template-columns: repeat(2, 1fr); }
      .spec-item { padding-right: 1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-model">RS3 8Y</span>
    <span class="nav-name">Thomas</span>
  </nav>
  <section class="hero">
    <div class="hero-inner">
      <span class="hero-badge">Audi RS3 8Y &middot; 2024</span>
      <h1 class="hero-headline">Built to move.<br>Built for Thomas.</h1>
      <hr class="hero-rule" />
    </div>
  </section>
  <section class="specs">
    <p class="section-title">The Machine</p>
    <div class="specs-grid">
      <div class="spec-item">
        <div class="spec-value">400</div>
        <div class="spec-label">Horsepower</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">500</div>
        <div class="spec-label">Nm torque</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">3.8s</div>
        <div class="spec-label">0 – 100 km/h</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">290</div>
        <div class="spec-label">km/h top speed</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">2.5L</div>
        <div class="spec-label">5-cyl TFSI</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">AWD</div>
        <div class="spec-label">Quattro</div>
      </div>
      <div class="spec-item">
        <div class="spec-value">7-spd</div>
        <div class="spec-label">S tronic</div>
      </div>
    </div>
  </section>
</body>
</html>
